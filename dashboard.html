<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel de Fontes — StreamFlixVIP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a12;
    --surface: #14141f;
    --card: #181826;
    --card-hover: #1e1e30;
    --border: #232336;
    --border-soft: #1a1a2a;
    --accent: #6d28d9;
    --accent2: #8b5cf6;
    --gold: #f0a830;
    --gold-soft: #f0a83022;
    --red: #e5304a;
    --green: #4ade80;
    --text: #f4f3fa;
    --muted: #8888a8;
    --muted-dim: #5c5c78;
    --font: 'Outfit', sans-serif;
    --font-display: 'Fraunces', serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }

  nav {
    position:sticky; top:0; z-index:50;
    background:rgba(10,10,18,0.92); backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border-soft);
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 22px;
  }
  .logo { font-family:var(--font-display); font-size:1.2rem; font-weight:700; }
  .logo em { font-style:italic; color:var(--gold); }
  .nav-right { display:flex; align-items:center; gap:14px; font-size:0.82rem; color:var(--muted); }
  .nav-right button {
    background:var(--card); border:1px solid var(--border); color:var(--text);
    font-family:var(--font); font-size:0.8rem; font-weight:600; padding:7px 14px;
    border-radius:8px; cursor:pointer; transition:all .2s;
  }
  .nav-right button:hover { border-color:var(--accent2); }

  main { max-width:1100px; margin:0 auto; padding:28px 20px 80px; }

  .panel-title { font-family:var(--font-display); font-size:1.5rem; font-weight:700; margin-bottom:6px; }
  .panel-subtitle { color:var(--muted); font-size:0.88rem; margin-bottom:26px; }

  .search-box {
    display:flex; gap:10px; margin-bottom:10px;
  }
  .search-box select {
    background:var(--surface); border:1px solid var(--border); color:var(--text);
    font-family:var(--font); font-size:0.88rem; padding:11px 14px; border-radius:9px; outline:none;
  }
  .search-box input {
    flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text);
    font-family:var(--font); font-size:0.92rem; padding:11px 14px; border-radius:9px; outline:none;
  }
  .search-box input:focus, .search-box select:focus { border-color:var(--accent2); }
  .search-box button {
    background:var(--accent); border:none; color:#fff; font-family:var(--font);
    font-weight:700; font-size:0.88rem; padding:11px 22px; border-radius:9px; cursor:pointer;
  }
  .search-box button:hover { background:var(--accent2); }

  .results-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:14px;
    margin-top:18px;
  }
  .result-card {
    background:var(--card); border:1px solid var(--border-soft); border-radius:11px;
    overflow:hidden; cursor:pointer; transition:all .2s;
  }
  .result-card:hover { border-color:var(--accent2); transform:translateY(-3px); }
  .result-card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; background:var(--surface); }
  .result-card .ph { width:100%; aspect-ratio:2/3; display:flex; align-items:center; justify-content:center; font-size:2rem; background:var(--surface); }
  .result-card .info { padding:9px 10px; }
  .result-card .info .t { font-size:0.8rem; font-weight:600; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .result-card .info .y { font-size:0.72rem; color:var(--muted); margin-top:3px; }
  .result-card .badge {
    display:inline-block; font-size:0.62rem; font-weight:700; padding:2px 7px; border-radius:5px;
    background:var(--gold-soft); color:var(--gold); margin-top:5px;
  }
  .result-card .badge.has-sources { background:#4ade8022; color:var(--green); }

  .section { margin-top:38px; }
  .section-title { font-family:var(--font-display); font-size:1.15rem; font-weight:600; margin-bottom:14px; }

  table.sources-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
  table.sources-table th {
    text-align:left; color:var(--muted); font-weight:600; font-size:0.74rem; text-transform:uppercase;
    letter-spacing:.4px; padding:9px 10px; border-bottom:1px solid var(--border-soft);
  }
  table.sources-table td { padding:11px 10px; border-bottom:1px solid var(--border-soft); vertical-align:middle; }
  table.sources-table tr:hover td { background:var(--card-hover); }
  .url-cell { max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted); font-size:0.78rem; }
  .pill { display:inline-block; font-size:0.7rem; font-weight:700; padding:3px 9px; border-radius:6px; }
  .pill.active { background:#4ade8022; color:var(--green); }
  .pill.inactive { background:#88889022; color:var(--muted); }
  .row-actions { display:flex; gap:6px; }
  .row-actions button {
    background:var(--surface); border:1px solid var(--border); color:var(--muted);
    font-family:var(--font); font-size:0.72rem; font-weight:600; padding:5px 10px;
    border-radius:6px; cursor:pointer; transition:all .2s;
  }
  .row-actions button:hover { color:var(--text); border-color:var(--accent2); }
  .row-actions button.danger:hover { color:var(--red); border-color:var(--red); }

  /* MODAL: cadastrar fonte */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(4,4,8,0.92); z-index:200;
    display:none; align-items:center; justify-content:center; padding:18px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    width:100%; max-width:520px; max-height:90vh; overflow-y:auto; padding:24px;
  }
  .modal-head { display:flex; gap:14px; margin-bottom:20px; align-items:flex-start; }
  .modal-head img { width:62px; border-radius:8px; }
  .modal-head .ph { width:62px; height:93px; border-radius:8px; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
  .modal-head h3 { font-family:var(--font-display); font-size:1.1rem; margin-bottom:3px; }
  .modal-head .sub { color:var(--muted); font-size:0.8rem; }

  .modal label { display:block; font-size:0.78rem; color:var(--muted); font-weight:600; margin-bottom:6px; margin-top:14px; }
  .modal input, .modal select {
    width:100%; background:var(--card); border:1px solid var(--border); color:var(--text);
    font-family:var(--font); font-size:0.88rem; padding:10px 12px; border-radius:8px; outline:none;
  }
  .modal input:focus, .modal select:focus { border-color:var(--accent2); }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .modal-actions { display:flex; gap:10px; margin-top:22px; }
  .modal-actions button {
    flex:1; font-family:var(--font); font-weight:700; font-size:0.88rem; padding:11px; border-radius:9px;
    border:none; cursor:pointer;
  }
  .modal-actions .cancel { background:var(--card); color:var(--muted); }
  .modal-actions .save { background:var(--accent); color:#fff; }
  .modal-actions .save:hover { background:var(--accent2); }
  .modal-actions .save:disabled { opacity:0.6; cursor:not-allowed; }

  .close-x { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; }
  .modal { position:relative; }

  .empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:0.88rem; }

  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--accent); color:#fff; padding:11px 22px; border-radius:9px;
    font-size:0.85rem; font-weight:600; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999;
  }
  .toast.show { opacity:1; }
  .toast.error { background:var(--red); }

  @media (max-width:600px) {
    .results-grid { grid-template-columns:repeat(2,1fr); }
    table.sources-table { font-size:0.78rem; }
    .url-cell { max-width:140px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Stream<em>Flix</em>VIP <span style="color:var(--muted); font-weight:400; font-size:0.8rem;">/ painel</span></div>
  <div class="nav-right">
    <span id="userEmail"></span>
    <button onclick="logout()">Sair</button>
  </div>
</nav>

<main>
  <div class="panel-title">Fontes de vídeo</div>
  <div class="panel-subtitle">Busque um filme ou série no TMDB e cadastre o link do player.</div>

  <div class="search-box">
    <select id="searchType">
      <option value="movie">Filme</option>
      <option value="tv">Série</option>
    </select>
    <input type="text" id="searchInput" placeholder="Buscar título..." />
    <button onclick="doSearch()">Buscar</button>
  </div>

  <div class="results-grid" id="resultsGrid"></div>

  <div class="section">
    <div class="section-title">Fontes cadastradas recentemente</div>
    <div id="recentSourcesWrap">
      <div class="empty-state">Carregando...</div>
    </div>
  </div>
</main>

<!-- MODAL CADASTRO -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-x" onclick="closeModal()">✕</button>
    <div class="modal-head">
      <img id="modalPoster" src="" alt="" style="display:none" />
      <div class="ph" id="modalPosterPh">🎬</div>
      <div>
        <h3 id="modalTitle">-</h3>
        <div class="sub" id="modalSub"></div>
      </div>
    </div>

    <div id="episodeFields" style="display:none">
      <div class="row2">
        <div>
          <label>Temporada</label>
          <input type="number" id="seasonInput" min="1" value="1" />
        </div>
        <div>
          <label>Episódio</label>
          <input type="number" id="episodeInput" min="1" value="1" />
        </div>
      </div>
    </div>

    <label>URL do player / iframe</label>
    <input type="text" id="sourceUrlInput" placeholder="https://..." />

    <div class="row2">
      <div>
        <label>Nome do servidor</label>
        <input type="text" id="sourceLabelInput" placeholder="Ex: EasyVidPlay" value="EasyVidPlay" />
      </div>
      <div>
        <label>Prioridade</label>
        <input type="number" id="sourcePriorityInput" value="10" />
      </div>
    </div>

    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()">Cancelar</button>
      <button class="save" id="saveSourceBtn" onclick="saveSource()">Salvar fonte</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ──
  const SUPABASE_URL = 'https://gkujbjpvphuvrejpvvtz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdWpianB2cGh1dnJlanB2dnR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTQ2OTMsImV4cCI6MjA5NDI3MDY5M30.Zoqdn0V6SZOAfhz9kK9NgG6lniJdyVqihLsNT-O8Huw';
  const TMDB_KEY = '1c40bbe9a9f9e1e8a812d22c4c407d8f';
  const TMDB_BASE = 'https://api.themoviedb.org/3';
  const IMG_BASE = 'https://image.tmdb.org/t/p/';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentUser = null;
  let currentItem = null; // item TMDB selecionado pro modal

  // ── AUTH GUARD ──
  (async function guard() {
    const { data } = await supabase.auth.getSession();
    if (!data.session) {
      window.location.href = './index.html';
      return;
    }
    currentUser = data.session.user;

    const { data: adminRow } = await supabase
      .from('vip_panel_admins')
      .select('email, display_name, role')
      .eq('id', currentUser.id)
      .maybeSingle();

    if (!adminRow) {
      await supabase.auth.signOut();
      window.location.href = './index.html';
      return;
    }

    document.getElementById('userEmail').textContent = adminRow.display_name || adminRow.email;
    loadRecentSources();
  })();

  function logout() {
    supabase.auth.signOut().then(() => window.location.href = './index.html');
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── BUSCA TMDB ──
  async function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    const type = document.getElementById('searchType').value;
    const grid = document.getElementById('resultsGrid');
    if (!q) return;

    grid.innerHTML = '<div class="empty-state">Buscando...</div>';

    try {
      const url = new URL(`${TMDB_BASE}/search/${type}`);
      url.searchParams.set('api_key', TMDB_KEY);
      url.searchParams.set('language', 'pt-BR');
      url.searchParams.set('query', q);
      const res = await fetch(url);
      const data = await res.json();
      const results = data.results || [];

      if (results.length === 0) {
        grid.innerHTML = '<div class="empty-state">Nenhum resultado encontrado.</div>';
        return;
      }

      // checa quais já têm fonte cadastrada
      const ids = results.map(r => r.id);
      const { data: existing } = await supabase
        .from('vip_sources')
        .select('tmdb_id')
        .eq('media_type', type)
        .in('tmdb_id', ids);
      const existingSet = new Set((existing || []).map(e => e.tmdb_id));

      grid.innerHTML = results.map(r => {
        const title = r.title || r.name || 'Sem título';
        const year = (r.release_date || r.first_air_date || '').slice(0,4);
        const hasSource = existingSet.has(r.id);
        const poster = r.poster_path
          ? `<img src="${IMG_BASE}w200${r.poster_path}" alt="" loading="lazy" />`
          : `<div class="ph">🎬</div>`;
        return `
          <div class="result-card" onclick='openModal(${JSON.stringify({
            id: r.id, title, year, type, poster_path: r.poster_path
          }).replace(/'/g, "&#39;")})'>
            ${poster}
            <div class="info">
              <div class="t">${title}</div>
              <div class="y">${year || '—'}</div>
              <span class="badge ${hasSource ? 'has-sources' : ''}">${hasSource ? '✓ Cadastrado' : 'Sem fonte'}</span>
            </div>
          </div>
        `;
      }).join('');
    } catch (e) {
      grid.innerHTML = '<div class="empty-state">Erro ao buscar. Tente novamente.</div>';
    }
  }
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  // ── MODAL ──
  function openModal(item) {
    currentItem = item;
    document.getElementById('modalTitle').textContent = item.title;
    document.getElementById('modalSub').textContent =
      `${item.type === 'movie' ? 'Filme' : 'Série'} · ${item.year || '—'} · TMDB #${item.id}`;

    const img = document.getElementById('modalPoster');
    const ph = document.getElementById('modalPosterPh');
    if (item.poster_path) {
      img.src = IMG_BASE + 'w200' + item.poster_path;
      img.style.display = 'block';
      ph.style.display = 'none';
    } else {
      img.style.display = 'none';
      ph.style.display = 'flex';
    }

    document.getElementById('episodeFields').style.display = item.type === 'tv' ? 'block' : 'none';
    document.getElementById('seasonInput').value = 1;
    document.getElementById('episodeInput').value = 1;
    document.getElementById('sourceUrlInput').value = '';
    document.getElementById('sourceLabelInput').value = 'EasyVidPlay';
    document.getElementById('sourcePriorityInput').value = 10;

    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    currentItem = null;
  }

  async function saveSource() {
    if (!currentItem) return;
    const url = document.getElementById('sourceUrlInput').value.trim();
    const label = document.getElementById('sourceLabelInput').value.trim() || 'Player';
    const priority = parseInt(document.getElementById('sourcePriorityInput').value, 10) || 0;

    if (!url) {
      showToast('Cole a URL do player antes de salvar.', true);
      return;
    }

    const isTv = currentItem.type === 'tv';
    const season = isTv ? parseInt(document.getElementById('seasonInput').value, 10) : null;
    const episode = isTv ? parseInt(document.getElementById('episodeInput').value, 10) : null;

    const btn = document.getElementById('saveSourceBtn');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      const { error } = await supabase.from('vip_sources').insert({
        tmdb_id: currentItem.id,
        media_type: currentItem.type,
        season, episode,
        title: currentItem.title,
        poster_path: currentItem.poster_path,
        source_url: url,
        source_label: label,
        priority,
        created_by: currentUser.id
      });
      if (error) throw error;

      showToast('Fonte salva com sucesso!');
      closeModal();
      loadRecentSources();
    } catch (e) {
      showToast(e.message?.includes('duplicate') ? 'Essa fonte já está cadastrada pra esse item.' : 'Erro ao salvar: ' + e.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Salvar fonte';
    }
  }

  // ── LISTA DE FONTES RECENTES ──
  async function loadRecentSources() {
    const wrap = document.getElementById('recentSourcesWrap');
    const { data, error } = await supabase
      .from('vip_sources')
      .select('id, tmdb_id, media_type, season, episode, title, source_url, source_label, priority, is_active, created_at')
      .order('created_at', { ascending: false })
      .limit(30);

    if (error) {
      wrap.innerHTML = '<div class="empty-state">Erro ao carregar fontes.</div>';
      return;
    }
    if (!data || data.length === 0) {
      wrap.innerHTML = '<div class="empty-state">Nenhuma fonte cadastrada ainda. Busque um título acima para começar.</div>';
      return;
    }

    wrap.innerHTML = `
      <table class="sources-table">
        <thead>
          <tr>
            <th>Título</th><th>Tipo</th><th>Ep.</th><th>Servidor</th><th>URL</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${data.map(s => `
            <tr>
              <td>${s.title}</td>
              <td>${s.media_type === 'movie' ? 'Filme' : 'Série'}</td>
              <td>${s.season ? `T${s.season}E${s.episode}` : '—'}</td>
              <td>${s.source_label}</td>
              <td class="url-cell" title="${s.source_url}">${s.source_url}</td>
              <td><span class="pill ${s.is_active ? 'active' : 'inactive'}">${s.is_active ? 'Ativa' : 'Inativa'}</span></td>
              <td>
                <div class="row-actions">
                  <button onclick="toggleActive(${s.id}, ${s.is_active})">${s.is_active ? 'Desativar' : 'Ativar'}</button>
                  <button class="danger" onclick="deleteSource(${s.id})">Excluir</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  async function toggleActive(id, currentlyActive) {
    const { error } = await supabase.from('vip_sources').update({ is_active: !currentlyActive }).eq('id', id);
    if (error) { showToast('Erro: ' + error.message, true); return; }
    loadRecentSources();
  }

  async function deleteSource(id) {
    if (!confirm('Excluir essa fonte? Essa ação não pode ser desfeita.')) return;
    const { error } = await supabase.from('vip_sources').delete().eq('id', id);
    if (error) { showToast('Erro: ' + error.message, true); return; }
    showToast('Fonte excluída.');
    loadRecentSources();
  }
</script>
</body>
</html>
